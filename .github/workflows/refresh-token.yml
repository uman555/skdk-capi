name: Refresh Meta Token

on:
  schedule:
    # 每 50 天跑一次（long-lived token 60 天有效）
    - cron: '0 0 */50 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  refresh-token:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pynacl

      - name: Refresh Meta Long-Lived Token
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python token_refresher.py

      - name: Manual update notification
        if: failure()
        run: |
          echo "❌ Token refresh failed. Please update manually:"
          echo "1. Visit https://developers.facebook.com/tools/explorer/"
          echo "2. Generate new short-lived token"
          echo "3. Run: python get_long_lived_token.py"
          echo "4. Update GitHub Secret META_ACCESS_TOKEN"
